<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tipandtale — Waitlist</title>

<link rel="stylesheet" href="style.css">

<!-- font -->
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png" alt="tipandtale logo">
</div>

<div class="badge">
✨ something cool is cooking
</div>

<h1>
First dibs<br>
on the drip!
</h1>

<p class="subtitle">
Join the waitlist and be the first to know when<br>
we drop. No spam, don't worry.
</p>

<form name="waitlist" method="POST" data-netlify="true" id="waitlist-form">

<input type="hidden" name="form-name" value="waitlist">

<input
type="email"
name="email"
placeholder="your@email.com"
required
/>

<button type="submit">
Get in line →
</button>

</form>


<footer>
made with care · 2026
</footer>

</div>

<script src="script.js"></script>

</body>
</html>
